---
# tasks file for RunContainer
- name: Setup de la máquina
  include_tasks: ProvisionVM.yml

- name: Iniciar sesión en ACR
  containers.podman.podman_login:
    registry: "{{ acr_login_server }}"
    username: "{{ acr_admin_username }}"
    password: "{{ acr_admin_password }}"

- name: Configurar fichero Nginx y autenticación
  include_tasks: ConfNginx.yml

- name: Configurar fichero Nginx y autenticación
  include_tasks: CreateContainer.yml

- name: Cerrar sesión de ACR
  containers.podman.podman_logout:
    registry: "{{ acr_login_server }}"

- name: Reiniciar el servicio
  containers.podman.podman_container:
    name: nginx
    state: started
    restart: yes