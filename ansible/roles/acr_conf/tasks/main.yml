---
# tasks file for acr_conf

- name: Iniciar sesión en ACR
  containers.podman.podman_login:
    registry: "{{ acr_login_server }}"
    username: "{{ acr_admin_username }}"
    password: "{{ acr_admin_password }}"

- name: Descargar imagen de nginx
  ansible.builtin.include_tasks: Pullnginx.yml

- name: Descargar imagen de redis
  ansible.builtin.include_tasks: PullRedis.yml

- name: Descargar imagen de Vote-Frontend
  ansible.builtin.include_tasks: PullVoteFront.yml

- name: Cerrar sesión de ACR
  containers.podman.podman_logout:
    registry: "{{ acr_login_server }}"
